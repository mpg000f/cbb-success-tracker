name: Update Data & Deploy

on:
  # Daily at 8am UTC during season (Nov-Apr)
  schedule:
    - cron: '0 8 * 11,12,1,2,3,4 *'
    - cron: '0 8 * 5,6,7,8,9,10 1'  # Weekly (Mon) offseason
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python deps
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape_seasons.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --staged --quiet || git commit -m "Update data $(date -u +%Y-%m-%d)"
          git push

      - name: Install Node deps & build
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
